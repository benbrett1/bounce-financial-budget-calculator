name: Update Tax Rates

on:
  schedule:
    - cron: "0 1 1 7 *"   # 1am UTC on 1 July every year (new ATO financial year)
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/update_tax_rates.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet tax-rates.json || (
            git add tax-rates.json &&
            git commit -m "chore: update tax rates for new financial year" &&
            git push
          )

      - name: Alert if scrape failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⚠️ Tax rate update failed — manual review needed",
              body: "The scheduled tax rate scrape on " + new Date().toISOString().split("T")[0] + " failed.\n\nPlease check the [workflow run](" + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions) and update `tax-rates.json` manually if the ATO page structure has changed."
            })
